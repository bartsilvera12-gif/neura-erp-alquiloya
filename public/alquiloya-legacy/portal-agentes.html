<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portal de agentes — AlquiloYa</title>
<meta name="description" content="Ingresá para administrar tus propiedades, consultas y publicaciones en AlquiloYa." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue: #0058A5;
    --blue-700: #003e74;
    --blue-50: #eaf2fb;
    --yellow: #F9B000;
    --ink: #0b1622;
    --ink-2: #2a3543;
    --ink-3: #5b6573;
    --line: #e7ebf0;
    --bg: #ffffff;
    --bg-2: #f6f8fb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(180deg, #EAF4FF 0%, #ffffff 55%, #ffffff 100%);
    color: var(--ink);
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    font-size: 15px; line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 26px; line-height: 1.2; margin: 0; color: var(--ink); letter-spacing: -0.01em; text-align: center; }
  p  { margin: 0; color: var(--ink-3); }
  a  { color: inherit; text-decoration: none; }

  .wrap {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 56px 20px 40px;
  }
  .stack { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .logo { display: block; }
  .logo img { display: block; width: 180px; height: auto; }

  .card {
    width: 100%;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: 0 18px 40px -18px rgba(15, 23, 42, 0.25);
    padding: 28px;
  }
  .subtitle {
    margin-top: 10px;
    text-align: center;
    font-size: 14.5px;
    color: var(--ink-3);
  }
  .actions { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 100%;
    padding: 13px 20px;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 700; font-size: 14.5px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .15s ease, box-shadow .15s ease, transform .1s ease, border-color .15s ease;
  }
  .btn-primary {
    background: var(--blue); color: #fff;
    box-shadow: 0 8px 20px -6px rgba(0,88,165,.5);
  }
  .btn-primary:hover { background: var(--blue-700); }
  .btn-primary:active { transform: scale(.98); }

  .btn-outline {
    background: #fff; color: var(--blue);
    border-color: rgba(0,88,165,.3);
  }
  .btn-outline:hover { background: var(--blue-50); }
  .btn-outline:active { transform: scale(.98); }

  .back {
    font-size: 13.5px;
    color: var(--ink-3);
  }
  .back:hover { color: var(--blue); text-decoration: underline; }

  @media (max-width: 480px) {
    .wrap { padding: 36px 16px 28px; }
    .card { padding: 22px; border-radius: 16px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="stack">
      <a class="logo" href="/publico" aria-label="Volver al inicio">
        <img src="/alquiloya-legacy/assets/logo.png" alt="AlquiloYa" />
      </a>

      <div class="card">
        <h1>Portal de agentes y publicadores</h1>
        <p class="subtitle">Ingresá para administrar tus propiedades, consultas y publicaciones.</p>

        <div class="actions">
          <a class="btn btn-primary" href="/portal-agentes/login">Ya tengo cuenta</a>
          <a class="btn btn-outline"
             href="https://wa.me/595981000000?text=Hola%2C%20quiero%20solicitar%20acceso%20como%20agente%20AlquiloYa."
             target="_blank" rel="noopener noreferrer">Solicitar acceso</a>
        </div>
      </div>

      <a class="back" href="/publico">← Volver al inicio</a>
    </div>
  </div>
</body>
</html>
