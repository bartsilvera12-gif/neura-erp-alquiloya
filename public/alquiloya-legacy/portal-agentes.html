<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portal de agentes — AlquiloYa</title>
<meta name="description" content="Ingresá para administrar tus propiedades, consultas y publicaciones en AlquiloYa." />
<link rel="icon" type="image/png" href="/alquiloya-legacy/assets/icono.png" />
<link rel="apple-touch-icon" href="/alquiloya-legacy/assets/icono.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue: #0058A5;
    --blue-700: #003e74;
    --blue-50: #eaf2fb;
    --yellow: #F9B000;
    --ink: #0b1622;
    --ink-2: #2a3543;
    --ink-3: #5b6573;
    --line: #e7ebf0;
    --bg: #ffffff;
    --bg-2: #f6f8fb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(180deg, #EAF4FF 0%, #ffffff 55%, #ffffff 100%);
    color: var(--ink);
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    font-size: 15px; line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 26px; line-height: 1.2; margin: 0; color: var(--ink); letter-spacing: -0.01em; text-align: center; }
  p  { margin: 0; color: var(--ink-3); }
  a  { color: inherit; text-decoration: none; }

  .wrap {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 56px 20px 40px;
  }
  .stack { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .logo { display: block; }
  .logo img { display: block; width: 180px; height: auto; }

  .card {
    width: 100%;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: 0 18px 40px -18px rgba(15, 23, 42, 0.25);
    padding: 28px;
  }
  .subtitle {
    margin-top: 10px;
    text-align: center;
    font-size: 14.5px;
    color: var(--ink-3);
  }
  .actions { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 100%;
    padding: 13px 20px;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 700; font-size: 14.5px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .15s ease, box-shadow .15s ease, transform .1s ease, border-color .15s ease;
  }
  .btn-primary {
    background: var(--blue); color: #fff;
    box-shadow: 0 8px 20px -6px rgba(0,88,165,.5);
  }
  .btn-primary:hover { background: var(--blue-700); }
  .btn-primary:active { transform: scale(.98); }

  .btn-outline {
    background: #fff; color: var(--blue);
    border-color: rgba(0,88,165,.3);
  }
  .btn-outline:hover { background: var(--blue-50); }
  .btn-outline:active { transform: scale(.98); }

  .back {
    font-size: 13.5px;
    color: var(--ink-3);
  }
  .back:hover { color: var(--blue); text-decoration: underline; }

  @media (max-width: 480px) {
    .wrap { padding: 36px 16px 28px; }
    .card { padding: 22px; border-radius: 16px; }
    h1 { font-size: 22px; }
  }

  /* Modal Solicitar acceso */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(15,23,42,.55);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    width: 100%; max-width: 460px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 24px 60px -10px rgba(15,23,42,.4);
    padding: 24px;
    max-height: 92vh; overflow-y: auto;
  }
  .modal h2 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 20px; margin: 0; color: var(--ink); }
  .modal p.lead { margin-top: 6px; font-size: 13.5px; color: var(--ink-3); }
  .field { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--ink-2); text-transform: uppercase; letter-spacing: .03em; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 10px;
    font-family: inherit; font-size: 14px; color: var(--ink);
    background: #fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(0,88,165,.15);
  }
  .field textarea { min-height: 70px; resize: vertical; }
  .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .seg button {
    padding: 10px; border-radius: 10px; border: 1px solid var(--line);
    background: #fff; cursor: pointer; font-family: inherit;
    font-size: 13.5px; font-weight: 600; color: var(--ink-2);
  }
  .seg button.active { border-color: var(--blue); background: var(--blue-50); color: var(--blue); }
  .seg-rich button { padding: 12px 10px; text-align: center; transition: border-color .15s, background .15s; }
  .seg-rich button .seg-title { display: block; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 13.5px; }
  .seg-rich button .seg-sub { display: block; font-size: 11px; color: var(--ink-3); margin-top: 2px; font-weight: 500; }
  .seg-rich button.active .seg-sub { color: var(--blue); }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-actions .btn { flex: 1; padding: 11px 16px; font-size: 14px; }
  .modal-cancel { background: #f1f5f9; color: var(--ink-2); }
  .modal-cancel:hover { background: #e2e8f0; }
  .feedback { margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13px; display: none; }
  .feedback.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
  .feedback.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="stack">
      <a class="logo" href="/publico" aria-label="Volver al inicio">
        <img src="/alquiloya-legacy/assets/logo.png" alt="AlquiloYa" />
      </a>

      <div class="card">
        <h1>Portal de agentes y publicadores</h1>
        <p class="subtitle">Ingresá para administrar tus propiedades, consultas y publicaciones.</p>

        <div class="actions">
          <a class="btn btn-primary" href="/portal-agentes/login">Ya tengo cuenta</a>
          <button type="button" class="btn btn-outline" id="open-solicitar-acceso">Solicitar acceso</button>
        </div>
      </div>

      <a class="back" href="/publico">← Volver al inicio</a>
    </div>
  </div>

  <div class="modal-backdrop" id="solicitar-modal" role="dialog" aria-modal="true" aria-labelledby="sol-title">
    <div class="modal">
      <h2 id="sol-title">Solicitar acceso</h2>
      <p class="lead">Contanos quién sos. Nuestro equipo revisa cada pedido y te contactamos.</p>

      <form id="solicitar-form" novalidate>
        <div class="field">
          <label>¿Qué tipo de cuenta querés?</label>
          <div class="seg" role="tablist">
            <button type="button" data-tipo="propietario" class="active">Propietario</button>
            <button type="button" data-tipo="agente">Agente inmobiliario</button>
          </div>
        </div>

        <div class="field" id="field-subtipo" style="display:none">
          <label>Tipo de agente</label>
          <div class="seg seg-rich" role="tablist">
            <button type="button" data-subtipo="Independiente" class="active">
              <span class="seg-title">Independiente</span>
              <span class="seg-sub">Trabajo por mi cuenta</span>
            </button>
            <button type="button" data-subtipo="Inmobiliaria">
              <span class="seg-title">Inmobiliaria</span>
              <span class="seg-sub">Tengo una empresa</span>
            </button>
          </div>
          <input type="hidden" id="sol-subtipo" value="Independiente" />
        </div>

        <div class="field">
          <label for="sol-nombre">Nombre completo *</label>
          <input id="sol-nombre" type="text" required maxlength="160" />
        </div>
        <div class="field">
          <label for="sol-email">Email</label>
          <input id="sol-email" type="email" maxlength="160" placeholder="vos@ejemplo.com" />
        </div>
        <div class="field">
          <label for="sol-telefono">Teléfono / WhatsApp *</label>
          <input id="sol-telefono" type="tel" maxlength="40" required placeholder="+595 9XX XXX XXX" />
        </div>
        <div class="field" id="field-empresa" style="display:none">
          <label for="sol-empresa">Inmobiliaria / Razón social</label>
          <input id="sol-empresa" type="text" maxlength="160" />
        </div>
        <div class="field">
          <label for="sol-ciudad">Ciudad</label>
          <input id="sol-ciudad" type="text" maxlength="80" />
        </div>
        <div class="field">
          <label for="sol-mensaje">Mensaje (opcional)</label>
          <textarea id="sol-mensaje" maxlength="1200" placeholder="Contanos cuántos inmuebles tenés, qué buscás, etc."></textarea>
        </div>

        <div class="feedback" id="sol-feedback"></div>

        <div class="modal-actions">
          <button type="button" class="btn modal-cancel" id="sol-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="sol-submit">Enviar solicitud</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      var backdrop = document.getElementById('solicitar-modal');
      var openBtn = document.getElementById('open-solicitar-acceso');
      var cancelBtn = document.getElementById('sol-cancel');
      var form = document.getElementById('solicitar-form');
      var submitBtn = document.getElementById('sol-submit');
      var feedback = document.getElementById('sol-feedback');
      var tipoBtns = document.querySelectorAll('.seg button[data-tipo]');
      var subTipoBtns = document.querySelectorAll('.seg button[data-subtipo]');
      var subTipoHidden = document.getElementById('sol-subtipo');
      var fieldSub = document.getElementById('field-subtipo');
      var fieldEmpresa = document.getElementById('field-empresa');
      var tipo = 'propietario';

      function openModal() { backdrop.classList.add('open'); }
      function closeModal() {
        backdrop.classList.remove('open');
        feedback.className = 'feedback';
        feedback.textContent = '';
      }
      openBtn.addEventListener('click', openModal);
      cancelBtn.addEventListener('click', closeModal);
      backdrop.addEventListener('click', function (e) { if (e.target === backdrop) closeModal(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

      tipoBtns.forEach(function (b) {
        b.addEventListener('click', function () {
          tipoBtns.forEach(function (x) { x.classList.remove('active'); });
          b.classList.add('active');
          tipo = b.getAttribute('data-tipo');
          fieldSub.style.display = tipo === 'agente' ? '' : 'none';
          fieldEmpresa.style.display = tipo === 'agente' ? '' : 'none';
        });
      });
      subTipoBtns.forEach(function (b) {
        b.addEventListener('click', function () {
          subTipoBtns.forEach(function (x) { x.classList.remove('active'); });
          b.classList.add('active');
          if (subTipoHidden) subTipoHidden.value = b.getAttribute('data-subtipo');
        });
      });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        feedback.className = 'feedback';
        feedback.textContent = '';

        var nombre = document.getElementById('sol-nombre').value.trim();
        var email = document.getElementById('sol-email').value.trim();
        var telefono = document.getElementById('sol-telefono').value.trim();
        var empresa = document.getElementById('sol-empresa').value.trim();
        var ciudad = document.getElementById('sol-ciudad').value.trim();
        var mensaje = document.getElementById('sol-mensaje').value.trim();
        var subTipo = tipo === 'agente' ? document.getElementById('sol-subtipo').value : null;

        if (!nombre) { feedback.className = 'feedback error'; feedback.textContent = 'Ingresá tu nombre.'; return; }
        var telDigits = telefono.replace(/\D/g, '');
        if (telDigits.length < 7) { feedback.className = 'feedback error'; feedback.textContent = 'El teléfono es obligatorio.'; return; }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Enviando…';
        try {
          var res = await fetch('/api/public/alquiloya/solicitudes-acceso', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: tipo, sub_tipo: subTipo, nombre: nombre, email: email || null, telefono: telefono || null, empresa: empresa || null, ciudad: ciudad || null, mensaje: mensaje || null })
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok || !data || data.success === false) {
            throw new Error((data && (data.error || (data.data && data.data.error))) || ('HTTP ' + res.status));
          }
          feedback.className = 'feedback success';
          feedback.textContent = '¡Listo! Recibimos tu solicitud. En 24 hs hábiles vas a recibir un correo con tus accesos si tu solicitud es aceptada.';
          form.reset();
        } catch (err) {
          feedback.className = 'feedback error';
          feedback.textContent = 'No pudimos registrar tu solicitud. ' + (err && err.message ? err.message : '');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Enviar solicitud';
        }
      });
    })();
  </script>
</body>
</html>
